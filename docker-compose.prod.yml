services:
  postgres-db:
    image: postgres:16-alpine
    container_name: pestscan-postgres-db
    restart: always
    environment:
      POSTGRES_DB: pestscan_scouting
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d pestscan_scouting -h localhost -p 5432" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  springboot-api:
    image: ${IMAGE_REF}
    container_name: pestscan-springboot-api
    restart: always
    depends_on:
      postgres-db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres-db
      DB_PORT: 5432
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/pestscan_scouting
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_CACHE_TYPE: none
      APP_RUNTIME_MODE: CLOUD
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:?APP_PUBLIC_BASE_URL is required}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      LOGGING_FILE_NAME: /var/log/pestscan/mofo-pest-scout.log
    volumes:
      - ./logs:/var/log/pestscan:rw

volumes:
  pgdata:
