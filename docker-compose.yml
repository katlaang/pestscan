version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: pestscan-postgres
    environment:
      POSTGRES_DB: pestscan_scouting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432" # Keeps port 5433 open for your local desktop tools
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Mount local init scripts so the database is created on first run
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pestscan_scouting} -h localhost -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7
    container_name: pestscan-redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: pestscan-app
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local # Activates your application.yml profile settings
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/pestscan_scouting
      - SPRING_DATASOURCE_USERNAME=${LOCAL_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${LOCAL_DB_PASS}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=${LOCAL_JWT_SECRET}

volumes:
  postgres-data:
